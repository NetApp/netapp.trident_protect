[tox]
envlist=flake8,yamllint,ansible-lint

[testenv:lint]
labels = lint
description = run linting checks
deps = flake8
commands = flake8 .

[testenv:yamllint]
labels = lint
description = run yamllint on YAML sources
deps = yamllint
commands = yamllint .

[testenv:ansible-lint]
labels = lint
description = run ansible-lint on the collection
deps =
    ansible-lint
    ansible-core>=2.16
commands = ansible-lint
