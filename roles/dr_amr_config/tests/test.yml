---
- name: Test dr_amr_config role
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    # Provide all required variables for the role here. See the role
    # README.md for a full list.
    src_oc_api_url: https://api.src.example.openshift.com:6443
    src_oc_api_token: <your_src_api_token>
    dst_oc_api_url: https://api.dst.example.openshift.com:6443
    dst_oc_api_token: <your_dst_api_token>
    validate_certs: false
    src_appvault_name: src-appvault-ontap
    dst_appvault_name: dst-appvault-ontap
    src_application_name: my-application
    src_vm_namespace: src-vm-namespace
    dst_vm_namespace: dst-vm-namespace
    appmirrorrelationship_specs:
      name: app-mirror-relationship
      namespaceMapping:
        - source: src-vm-namespace
          destination: dst-vm-namespace
  roles:
    - dr_amr_config
