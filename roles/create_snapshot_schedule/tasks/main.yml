---
# Ansible tasks to create Snapshot schedules for VMs in OpenShift Virtualization using Trident protect

# Verify required variables are defined and not empty
- name: Verify required variables are defined and not empty
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when: "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - oc_api_url
    - oc_api_token
    - snapshot_schedule_name
    - application_name
    - appvault_name
    - vm_namespace
    - snapshot_granularity
    - snapshot_retention_count
    - snapshot_minute

# Validate snapshot_granularity value and ensure the time fields it requires are set.
# Trident Protect Schedule CR requires different fields depending on granularity:
#   Hourly  -> minute
#   Daily   -> hour, minute
#   Weekly  -> hour, minute, dayOfWeek
#   Monthly -> hour, minute, dayOfMonth
- name: Validate snapshot_granularity and granularity-specific time fields
  ansible.builtin.assert:
    that:
      - snapshot_granularity in ['Hourly', 'Daily', 'Weekly', 'Monthly']
      - (snapshot_granularity == 'Hourly') or (snapshot_hour is defined and (snapshot_hour | string | length) > 0)
      - (snapshot_granularity != 'Weekly') or (snapshot_day_of_week is defined and (snapshot_day_of_week | string | length) > 0)
      - (snapshot_granularity != 'Monthly') or (snapshot_day_of_month is defined and (snapshot_day_of_month | string | length) > 0)
    fail_msg: >-
      snapshot_granularity must be one of [Hourly, Daily, Weekly, Monthly] and the time fields
      it requires (hour for Daily/Weekly/Monthly, dayOfWeek for Weekly, dayOfMonth for Monthly)
      must be defined.
    success_msg: snapshot_granularity and the corresponding time fields validated successfully

# Define anchor for OpenShift/Kubernetes API login info
- name: Define anchor for OpenShift/Kubernetes API login info
  ansible.builtin.set_fact:
    k8s_auth: &k8s_auth
      host: "{{ oc_api_url | default(omit) }}"
      api_key: "{{ oc_api_token | default(omit) }}"
      validate_certs: "{{ validate_certs }}"

# Create snapshot schedule for specific VMs in a namespace by using corresponding application
- name: >-
    Create snapshot schedule for specific VMs by using corresponding application -
    {{ application_name | default('') ~ ' / ' ~ vm_namespace | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: present
    namespace: "{{ vm_namespace | default('') }}"
    definition:
      apiVersion: protect.trident.netapp.io/v1
      kind: Schedule
      metadata:
        name: "{{ snapshot_schedule_name | default('') }}"
      spec:
        applicationRef: "{{ application_name | default('') }}"
        appVaultRef: "{{ appvault_name | default('') }}"
        enabled: true
        granularity: "{{ snapshot_granularity | default('') }}"
        hour: "{{ snapshot_hour | default('') | string }}"
        dayOfMonth: "{{ snapshot_day_of_month | default('') | string }}"
        dayOfWeek: "{{ snapshot_day_of_week | default('') | string }}"
        minute: "{{ snapshot_minute | default('') | string }}"
        snapshotRetention: "{{ snapshot_retention_count | default('') | string }}"
        backupRetention: "0"
  when:
    - snapshot_schedule_name is defined and snapshot_schedule_name != ""
    - application_name is defined and application_name != ""
    - appvault_name is defined and appvault_name != ""
    - vm_namespace is defined and vm_namespace != ""
    - snapshot_granularity is defined and snapshot_granularity != ""
    - snapshot_retention_count is defined and snapshot_retention_count != ""
  tags:
    - tp_create_snapshot_schedule

# Verify the newly created snapshot schedule is in place
- name: Get snapshot schedule from namespace - {{ snapshot_schedule_name | default('') ~ ' / ' ~ vm_namespace | default('') }}
  kubernetes.core.k8s_info:
    <<: *k8s_auth
    api_version: protect.trident.netapp.io/v1
    kind: Schedule
    name: "{{ snapshot_schedule_name | default('') }}"
    namespace: "{{ vm_namespace | default('') }}"
  register: schedule_output
  when:
    - snapshot_schedule_name is defined and snapshot_schedule_name != ""
    - vm_namespace is defined and vm_namespace != ""
  tags:
    - tp_verify_snapshot_schedule

- name: Verify that the snapshot schedule was created successfully - {{ snapshot_schedule_name | default('') ~ ' / ' ~ vm_namespace | default('') }}
  ansible.builtin.debug:
    msg: "{{ schedule_output.resources[0] }}"
  when:
    - schedule_output.resources is defined
    - schedule_output.resources | length > 0
  tags:
    - tp_verify_snapshot_schedule
