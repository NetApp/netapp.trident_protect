---
- name: Test snapshot_and_restore_scenario role
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    oc_api_url: https://api.example.openshift.com:6443
    oc_api_token: <your_api_token>
    # Explicit opt-out: example.openshift.com placeholder + lab clusters typically use self-signed certs.
    # The collection default is true; only set this to false intentionally.
    validate_certs: false
    appvault_name: appvault-ontap
    application_name: my-application
    vm_namespace: vm-namespace
    vm_list:
      - vm-1
      - vm-2
    pvc_list:
      - pvc-1
      - pvc-2
    vm_label: protect-vms
    snapshotinplacerestore_name: snapshot-restore
  roles:
    - snapshot_and_restore_scenario
